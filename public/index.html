<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.png">
<title>Tricks Collection</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--card:#141414;--border:#222;
  --text:#e8e8e8;--text2:#777;--text3:#444;
  --accent:#ff5722;--accent-dim:rgba(255,87,34,.12);
  --green:#66bb6a;--red:#ef5350;
  --radius:10px;--speed:180ms
}
html{scrollbar-color:#333 #0a0a0a}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',Roboto,sans-serif}

.header{position:fixed;top:0;left:0;right:0;height:52px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;z-index:50}
.header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.header h1 span{color:var(--accent)}
.header .spacer{flex:1}

.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all var(--speed);font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#e64a19}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--card);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(239,83,80,.3)}
.btn-danger:hover{background:rgba(239,83,80,.1)}
.search-input{padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;width:180px;transition:border-color var(--speed);margin-right:8px}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--text3)}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:240px 1fr;margin-top:52px;min-height:calc(100vh - 52px)}

/* ── Sidebar ── */
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:12px 0;overflow-y:auto;position:sticky;top:52px;height:calc(100vh - 52px)}
.sidebar-head{padding:8px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.sidebar-head span{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.sidebar-add{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;transition:all var(--speed)}
.sidebar-add:hover{color:var(--accent);background:var(--accent-dim)}

.tree-node{user-select:none}
.tree-row{display:flex;align-items:center;padding:5px 8px;cursor:pointer;border-radius:6px;margin:1px 6px;transition:background var(--speed),border-color var(--speed)}
.tree-row:hover{background:rgba(255,255,255,.04)}
.tree-row.active{background:var(--accent-dim)}
.tree-row.drag-over{background:var(--accent-dim);outline:1px dashed var(--accent);outline-offset:-1px}
.tree-toggle{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text3);transition:transform var(--speed);flex-shrink:0}
.tree-toggle.open{transform:rotate(90deg)}
.tree-toggle.hidden{visibility:hidden}
.tree-name{flex:1;font-size:13px;padding:0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-count{font-size:11px;color:var(--text3);margin-right:2px}
.tree-act{background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;line-height:1;padding:2px 4px;border-radius:3px;opacity:0;transition:all var(--speed);flex-shrink:0}
.tree-row:hover .tree-act{opacity:1}
.tree-act:hover{color:var(--text);background:rgba(255,255,255,.08)}
.tree-act.danger:hover{color:var(--red);background:rgba(239,83,80,.1)}
.tree-kids{padding-left:16px}
.tree-input{background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-size:12px;padding:3px 8px;width:calc(100% - 12px);outline:none;font-family:inherit;margin:2px 6px}
.root-row .tree-name{font-weight:600}
.root-row{padding:8px 8px;margin:0 6px 4px}

/* ── Main / Grid ── */
.main{padding:24px 28px 0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding-bottom:24px}

/* ── Inline Detail View ── */
.detail-view{padding-bottom:24px}
.detail-topbar{display:flex;gap:8px;align-items:center;margin-bottom:16px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform var(--speed),border-color var(--speed)}
.card:hover{transform:translateY(-2px);border-color:#333}
.card.dragging{opacity:.4}
.card-media{position:relative;width:100%;aspect-ratio:16/10;background:#0d0d0d;overflow:hidden}
.card-media img,.card-media video{width:100%;height:100%;object-fit:cover;display:block}
.card-badge{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);color:#aaa}
.card-dur{position:absolute;bottom:8px;right:8px;padding:2px 6px;border-radius:3px;font-size:11px;font-family:monospace;background:rgba(0,0,0,.75);color:#ccc}
.card-info{padding:12px 14px}
.card-name{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:12px;color:var(--text2);display:flex;gap:8px}
.card-clip-count{font-size:11px;color:var(--accent);margin-top:4px}

.inline-edit{background:var(--bg);border:1px solid var(--accent);border-radius:4px;color:var(--text);font-size:inherit;font-weight:inherit;font-family:inherit;padding:2px 6px;width:100%;outline:none}

/* ── Empty ── */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-text{font-size:15px;margin-bottom:20px}

/* ── Modal ── */
.modal{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all var(--speed)}
.modal.active{opacity:1;visibility:visible}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.88)}
.modal-card{position:relative;background:var(--card);border:1px solid var(--border);border-radius:14px;width:92%;max-height:90vh;overflow-y:auto}
.modal-card.sm{max-width:500px}
.modal-card.lg{max-width:880px}
.modal-x{position:absolute;top:12px;right:14px;background:rgba(0,0,0,.5);border:none;color:var(--text2);font-size:18px;cursor:pointer;z-index:10;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all var(--speed)}
.modal-x:hover{background:rgba(255,255,255,.1);color:var(--text)}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.modal-head h2{font-size:17px;font-weight:600}
.modal-body{padding:20px 24px}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.field input,.field textarea,.field select{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color var(--speed)}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:56px}
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:36px 20px;text-align:center;cursor:pointer;transition:all var(--speed)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--accent-dim)}
.drop-zone.has-file{border-style:solid;border-color:var(--green);background:rgba(102,187,106,.06)}
.dz-icon{font-size:28px;margin-bottom:8px;color:var(--text2)}
.dz-text{font-size:14px;margin-bottom:4px}
.dz-sub{font-size:12px;color:var(--text3)}
.file-preview{margin-top:12px}
.file-preview img,.file-preview video{max-height:180px;border-radius:6px;display:block;margin:0 auto}
.file-name{font-size:12px;color:var(--text2);margin-top:6px;text-align:center;word-break:break-all}

/* ── Detail ── */
.detail-video{background:#000;border-radius:8px;overflow:hidden;margin-bottom:16px}
.detail-video video{width:100%;max-width:1080px;max-height:80vh;object-fit:contain;display:block;margin:0 auto;transition:opacity .15s}
.detail-info{margin-bottom:16px}
.detail-name{font-size:20px;font-weight:700;margin-bottom:8px}
.detail-tags{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.cat-tag{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.3px;background:var(--accent-dim);color:var(--accent)}
.detail-notes{font-size:14px;color:var(--text2);line-height:1.6}

/* ── Clips ── */
.clips-section{border-top:1px solid var(--border);padding-top:16px;margin-top:8px}
.clips-head{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.clip-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.clip-item{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--bg);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all var(--speed);font-size:12px;white-space:nowrap}
.clip-item:hover{border-color:#444;background:rgba(255,255,255,.03)}
.clip-item.playing{border-color:var(--accent);background:var(--accent-dim)}
.clip-name{font-size:12px}
.clip-act{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0 0 0 2px;border-radius:3px;opacity:0;transition:all var(--speed);line-height:1}
.clip-item:hover .clip-act{opacity:1}
.clip-act:hover{color:var(--red)}
.clip-stop{background:none;border:1px solid var(--accent);color:var(--accent);border-radius:20px;padding:3px 12px;font-size:11px;cursor:pointer;font-family:inherit;transition:all var(--speed)}
.clip-stop:hover{background:var(--accent-dim)}

/* ── Context Menu ── */
.ctx-menu{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 0;z-index:150;min-width:120px;box-shadow:0 8px 24px rgba(0,0,0,.6);display:none}
.ctx-menu.show{display:block}
.ctx-item{padding:7px 16px;font-size:13px;cursor:pointer;color:var(--text);transition:background 100ms}
.ctx-item:hover{background:rgba(255,255,255,.06)}
.ctx-item.danger{color:var(--red)}
.clip-act.danger:hover{color:var(--red)}

.clip-add{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px}
.clip-add-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.clip-add-row .trim-val{font-family:monospace;font-size:13px;min-width:58px;padding:3px 7px;background:var(--card);border:1px solid var(--border);border-radius:4px;text-align:center;color:var(--text)}
.clip-add-name{margin-top:10px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:13px;z-index:200;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Hamburger & Overlay ── */
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 10px 4px 0;line-height:1}
.sidebar-overlay{display:none}

/* ── Responsive ── */
@media(max-width:768px){
  .hamburger{display:block}
  .layout{grid-template-columns:1fr}
  .sidebar{position:fixed;top:52px;left:-260px;width:260px;z-index:40;height:calc(100vh - 52px);transition:left var(--speed)}
  .sidebar.open{left:0}
  .sidebar-overlay{position:fixed;top:52px;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:39;cursor:pointer}
  .sidebar.open~.sidebar-overlay,.layout:has(.sidebar.open)~.sidebar-overlay{display:block}
  .main{padding:16px 12px 0}
  .grid{grid-template-columns:1fr;gap:12px;padding-bottom:16px}
  .header h1{font-size:16px}
  .search-input{width:100px}
}
</style>
</head>
<body>

<div class="header">
  <button class="hamburger" id="hamburgerBtn">&#9776;</button>
  <h1><span>Tricks</span> Collection</h1>
  <div class="spacer"></div>
  <input type="text" id="searchInput" class="search-input" placeholder="搜索..." autocomplete="off">
  <a href="/local.html" class="btn btn-ghost btn-sm" style="text-decoration:none">本地浏览</a>
  <a href="/server.html" class="btn btn-ghost btn-sm" style="text-decoration:none">服务器浏览</a>
  <button class="btn btn-primary" id="uploadBtn">+ 上传</button>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <span>分类</span>
      <button class="sidebar-add" id="addRootBtn" title="添加分类">+</button>
    </div>
    <div id="tree"></div>
  </div>
  <div class="main" id="mainArea">
    <div class="grid" id="grid"></div>
    <div class="detail-view" id="detailView" style="display:none">
      <div class="detail-topbar">
        <button class="btn btn-ghost btn-sm" id="backToGrid">&larr; 返回</button>
        <button class="btn btn-ghost btn-sm" id="prevTrickBtn">上一个</button>
        <button class="btn btn-ghost btn-sm" id="nextTrickBtn">下一个</button>
        <div class="spacer"></div>
        <span id="navInfo" style="font-size:11px;color:var(--text3)"></span>
        <button class="btn btn-danger btn-sm" id="deleteTrick">删除</button>
      </div>
      <div class="detail-video"><video id="detailVideo" controls loop preload="auto"></video></div>
      <div class="detail-info">
        <div class="detail-name" id="detailName"></div>
        <div class="detail-tags" id="detailTags"></div>
        <div class="detail-notes" id="detailNotes"></div>
      </div>
      <div class="clips-section">
        <div class="clips-head">
          <span>片段标记</span>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="clip-stop" id="stopClipBtn" style="display:none">停止循环</button>
            <button class="btn btn-ghost btn-sm" id="toggleClipAdd">+ 标记片段</button>
          </div>
        </div>
        <div class="clip-list" id="clipList"></div>
        <div class="clip-add" id="clipAddPanel" style="display:none">
          <div id="clipEditTitle" style="display:none;font-size:13px;color:var(--accent);margin-bottom:8px;font-weight:600">编辑片段</div>
          <div class="clip-add-row">
            <button class="btn btn-ghost btn-sm" id="markStartBtn">起点 (A)</button>
            <span class="trim-val" id="markStartVal">--</span>
            <button class="btn btn-ghost btn-sm" id="markEndBtn">终点 (B)</button>
            <span class="trim-val" id="markEndVal">--</span>
            <button class="btn btn-ghost btn-sm" id="previewClipBtn">预览</button>
          </div>
          <div class="field" style="margin-top:10px;margin-bottom:10px">
            <input type="text" id="clipNameInput" placeholder="片段名称（可选）">
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary btn-sm" id="saveClipBtn">保存片段</button>
            <button class="btn btn-ghost btn-sm" id="cancelEditBtn" style="display:none">取消</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Upload Modal -->
<div class="modal" id="uploadModal">
  <div class="modal-bg" data-close="uploadModal"></div>
  <div class="modal-card sm">
    <button class="modal-x" data-close="uploadModal">&times;</button>
    <div class="modal-head"><h2>上传技巧</h2></div>
    <div class="modal-body">
      <div class="field">
        <label>文件</label>
        <div class="drop-zone" id="dropZone">
          <div class="dz-icon">&#9654;</div>
          <div class="dz-text">拖拽视频或 GIF 到此处</div>
          <div class="dz-sub">支持 MP4 / WebM / MOV / GIF</div>
          <div class="file-preview" id="filePreview"></div>
        </div>
        <input type="file" id="fileInput" accept="video/*,.gif,image/gif" hidden>
      </div>
      <div class="field">
        <label>名称</label>
        <input type="text" id="nameInput" placeholder="例: Backside 360">
      </div>
      <div class="field">
        <label>备注（可选）</label>
        <textarea id="notesInput" placeholder="动作要领、注意点等"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" data-close="uploadModal">取消</button>
      <button class="btn btn-primary" id="submitUpload">上传</button>
    </div>
  </div>
</div>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxEdit">编辑</div>
  <div class="ctx-item" id="ctxRename">重命名</div>
  <div class="ctx-item" id="ctxExportMp4">导出 MP4</div>
  <div class="ctx-item" id="ctxExportGif">导出 GIF</div>
  <div class="ctx-item danger" id="ctxDelete">删除</div>
</div>

<div class="ctx-menu" id="cardCtxMenu">
  <div class="ctx-item" id="cardCtxRename">重命名</div>
  <div class="ctx-item danger" id="cardCtxDelete">删除</div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

const S = {
  cats: [], allTricks: [], tricks: [],
  curCat: null, expanded: new Set(),
  curTrick: null, file: null,
  playingClipId: null,
  navIdx: -1,

};

// ── API ──
function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function loadAll() {
  const [tricks, cats] = await Promise.all([
    fetch('/api/tricks').then(r => r.json()),
    fetch('/api/categories').then(r => r.json())
  ]);
  S.allTricks = tricks;
  S.cats = cats;
  await loadTricks();
  renderTree();
}

async function loadTricks() {
  const url = S.curCat ? `/api/tricks?category=${S.curCat}` : '/api/tricks';
  S.tricks = await fetch(url).then(r => r.json());
  renderGrid();
}

function catName(id) {
  if (!id) return '未分类';
  const c = S.cats.find(x => x.id === id);
  return c ? c.name : '未分类';
}
function catPath(id) {
  const parts = [];
  let c = S.cats.find(x => x.id === id);
  while (c) { parts.unshift(c.name); c = c.parentId ? S.cats.find(x => x.id === c.parentId) : null; }
  return parts.length ? parts.join(' / ') : '未分类';
}
function descendantIds(pid) {
  const ids = [pid];
  for (const c of S.cats.filter(x => x.parentId === pid)) ids.push(...descendantIds(c.id));
  return ids;
}
function childrenOf(pid) { return S.cats.filter(c => c.parentId === pid); }
function countTricks(catId) {
  if (catId === null) return S.allTricks.length;
  const ids = descendantIds(catId);
  return S.allTricks.filter(t => ids.includes(t.category)).length;
}

// ════════════════════════════
//  Sidebar Tree
// ════════════════════════════
function renderTree() {
  const tree = $('#tree');
  tree.innerHTML = '';

  // Root
  const rootRow = document.createElement('div');
  rootRow.className = 'tree-row root-row' + (S.curCat === null ? ' active' : '');
  rootRow.innerHTML = `<span class="tree-toggle hidden">&#9654;</span><span class="tree-name">全部</span><span class="tree-count">${S.allTricks.length}</span>`;
  rootRow.onclick = () => selectCat(null);
  makeDropTarget(rootRow, null);
  tree.appendChild(rootRow);

  for (const c of childrenOf(null)) tree.appendChild(buildNode(c));
}

function buildNode(cat) {
  const node = document.createElement('div');
  node.className = 'tree-node';
  const kids = childrenOf(cat.id);
  const hasKids = kids.length > 0;
  const open = S.expanded.has(cat.id);

  const row = document.createElement('div');
  row.className = 'tree-row' + (S.curCat === cat.id ? ' active' : '');

  const tog = document.createElement('span');
  tog.className = 'tree-toggle' + (hasKids ? (open ? ' open' : '') : ' hidden');
  tog.textContent = '\u25B6';
  if (hasKids) tog.onclick = e => { e.stopPropagation(); open ? S.expanded.delete(cat.id) : S.expanded.add(cat.id); renderTree(); };

  const nm = document.createElement('span');
  nm.className = 'tree-name';
  nm.textContent = cat.name;
  nm.onclick = () => selectCat(cat.id);

  // Double-click rename
  nm.ondblclick = e => { e.stopPropagation(); inlineEditEl(nm, cat.name, async v => {
    await fetch(`/api/categories/${cat.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: v }) });
    await loadAll();
  }); };

  const cnt = document.createElement('span');
  cnt.className = 'tree-count';
  const n = countTricks(cat.id);
  cnt.textContent = n || '';

  const addB = document.createElement('button');
  addB.className = 'tree-act';
  addB.textContent = '+';
  addB.onclick = e => { e.stopPropagation(); showInput(node, cat.id); };

  const delB = document.createElement('button');
  delB.className = 'tree-act danger';
  delB.textContent = '\u00D7';
  delB.onclick = e => { e.stopPropagation(); deleteCat(cat.id, cat.name); };

  row.append(tog, nm, cnt, addB, delB);
  node.appendChild(row);

  // Drop target
  makeDropTarget(row, cat.id);

  if (hasKids && open) {
    const wrap = document.createElement('div');
    wrap.className = 'tree-kids';
    for (const child of kids) wrap.appendChild(buildNode(child));
    node.appendChild(wrap);
  }
  return node;
}

function makeDropTarget(el, catId) {
  el.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', async e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    const trickId = e.dataTransfer.getData('text/trick-id');
    if (!trickId) return;
    await fetch(`/api/tricks/${trickId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category: catId })
    });
    await loadAll();
    toast('已移动');
  });
}

function showInput(parentNode, parentId) {
  const input = document.createElement('input');
  input.className = 'tree-input';
  input.placeholder = '分类名称...';
  parentNode.appendChild(input);
  input.focus();
  let saved = false;
  const done = async () => {
    if (saved) return;
    saved = true;
    const v = input.value.trim();
    if (v) {
      await fetch('/api/categories', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: v, parentId }) });
      await loadAll();
    }
    input.remove();
  };
  input.onkeydown = e => { if (e.key === 'Enter') done(); if (e.key === 'Escape') { saved = true; input.remove(); } };
  input.onblur = done;
}

async function deleteCat(id, name) {
  if (!confirm(`删除分类「${name}」？视频将移至未分类。`)) return;
  await fetch(`/api/categories/${id}`, { method: 'DELETE' });
  if (S.curCat === id) S.curCat = null;
  await loadAll();
}

function selectCat(id) { S.curCat = id; if (S.curTrick) showGrid(); if (window.innerWidth <= 768) closeSidebar(); loadTricks().then(() => renderTree()); }

$('#addRootBtn').onclick = () => {
  const tree = $('#tree');
  if (tree.querySelector('.tree-input')) return;
  const input = document.createElement('input');
  input.className = 'tree-input';
  input.placeholder = '新分类名称...';
  tree.appendChild(input);
  input.focus();
  let saved = false;
  const done = async () => {
    if (saved) return;
    saved = true;
    const v = input.value.trim();
    if (v) { await fetch('/api/categories', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: v, parentId: null }) }); await loadAll(); }
    input.remove();
  };
  input.onkeydown = e => { if (e.key === 'Enter') done(); if (e.key === 'Escape') { saved = true; input.remove(); } };
  input.onblur = done;
};

// ════════════════════════════
//  Grid
// ════════════════════════════
function renderGrid() {
  $('#searchInput').value = '';
  const grid = $('#grid');
  if (!S.tricks.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">&#9673;</div><div class="empty-text">还没有任何技巧视频</div><button class="btn btn-primary" onclick="openUpload()">上传第一个</button></div>`;
    return;
  }
  grid.innerHTML = '';
  for (const t of S.tricks) grid.appendChild(buildCard(t));
  setupHover();
}

// ── Search ──
$('#searchInput').oninput = () => {
  const q = $('#searchInput').value.trim().toLowerCase();
  document.querySelectorAll('#grid .card').forEach(card => {
    const name = card.querySelector('.card-name');
    if (!name) return;
    card.style.display = (!q || name.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
};

function buildCard(t) {
  const d = document.createElement('div');
  d.className = 'card';
  d.draggable = true;

  d.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/trick-id', t.id);
    e.dataTransfer.effectAllowed = 'move';
    d.classList.add('dragging');
  });
  d.addEventListener('dragend', () => d.classList.remove('dragging'));

  let media = '', badge = '';
  if (t.mediaType === 'gif') {
    media = `<img src="${t.videoPath}" alt="${t.name}" loading="lazy">`;
    badge = '<span class="card-badge">GIF</span>';
  } else {
    const thumb = t.thumbnail
      ? `<img src="${t.thumbnail}" alt="${t.name}" loading="lazy" class="card-thumb">`
      : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#333;font-size:32px">&#9654;</div>`;
    media = `${thumb}<video src="${t.videoPath}" muted loop preload="none" class="card-video" style="display:none"></video>`;
  }
  const clipCount = t.clips?.length || 0;

  d.innerHTML = `<div class="card-media">${media}${badge}</div><div class="card-info"><div class="card-name">${t.name}</div><div class="card-meta"><span>${catName(t.category)}</span>${t.fileSize ? `<span>${formatSize(t.fileSize)}</span>` : ''}<span>${new Date(t.createdAt).toLocaleDateString('zh-CN')}</span></div>${clipCount ? `<div class="card-clip-count">${clipCount} 个片段</div>` : ''}</div>`;

  // Click to open detail
  d.onclick = e => {
    if (e.target.closest('.inline-edit')) return;
    openDetail(t.id);
  };

  // Right-click context menu
  d.oncontextmenu = e => {
    e.preventDefault();
    showCardCtxMenu(e.clientX, e.clientY, t);
  };

  return d;
}

function setupHover() {
  $$('.card').forEach(card => {
    const vid = card.querySelector('.card-video');
    const thumb = card.querySelector('.card-thumb');
    if (!vid || !thumb) return;
    card.onmouseenter = () => { thumb.style.display = 'none'; vid.style.display = 'block'; vid.play().catch(() => {}); };
    card.onmouseleave = () => { vid.pause(); vid.style.display = 'none'; thumb.style.display = ''; };
  });
}

// ── Inline Edit ──
function inlineEditEl(el, currentVal, onSave) {
  const input = document.createElement('input');
  input.className = 'inline-edit';
  input.value = currentVal;
  el.textContent = '';
  el.appendChild(input);
  input.focus();
  input.select();

  const save = async () => {
    const v = input.value.trim();
    if (v && v !== currentVal) {
      el.textContent = v;
      await onSave(v);
    } else {
      el.textContent = currentVal;
    }
  };
  input.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); save(); } if (e.key === 'Escape') { el.textContent = currentVal; } };
  input.onblur = save;
  input.onclick = e => e.stopPropagation();
}

//  Modal

function openModal(id) { $(`#${id}`).classList.add('active'); }
function closeModal(id) { $(`#${id}`).classList.remove('active'); }
$$('[data-close]').forEach(el => el.onclick = () => closeModal(el.dataset.close));
document.onkeydown = e => { if (e.key === 'Escape') { if ($('#uploadModal').classList.contains('active')) closeModal('uploadModal'); else if (S.curTrick) showGrid(); } };

// ── Upload ──
function openUpload() {
  S.file = null;
  $('#filePreview').innerHTML = '';
  $('#dropZone').classList.remove('has-file');
  $('#nameInput').value = '';
  $('#notesInput').value = '';
  openModal('uploadModal');
}
$('#uploadBtn').onclick = openUpload;

const dropZone = $('#dropZone');
const fileInput = $('#fileInput');
dropZone.onclick = () => fileInput.click();
dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('dragover'); };
dropZone.ondragleave = () => dropZone.classList.remove('dragover');
dropZone.ondrop = e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) previewFile(e.dataTransfer.files[0]); };
fileInput.onchange = () => { if (fileInput.files[0]) previewFile(fileInput.files[0]); };

function previewFile(file) {
  S.file = file;
  dropZone.classList.add('has-file');
  const url = URL.createObjectURL(file);
  const isGif = file.type === 'image/gif' || file.name.toLowerCase().endsWith('.gif');
  $('#filePreview').innerHTML = isGif
    ? `<img src="${url}"><div class="file-name">${file.name}</div>`
    : `<video src="${url}" controls style="max-height:180px;border-radius:6px;display:block;margin:0 auto"></video><div class="file-name">${file.name}</div>`;
}

$('#submitUpload').onclick = async () => {
  if (!S.file) return toast('请选择文件');
  const name = $('#nameInput').value.trim();
  const btn = $('#submitUpload');
  btn.textContent = '上传中...';
  btn.disabled = true;
  try {
    const fd = new FormData();
    fd.append('file', S.file);
    fd.append('name', name);
    fd.append('notes', $('#notesInput').value);
    const r = await fetch('/api/tricks', { method: 'POST', body: fd });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error);
    closeModal('uploadModal');
    await loadAll();
    toast('上传成功');
  } catch (err) {
    toast('上传失败: ' + err.message);
  } finally {
    btn.textContent = '上传';
    btn.disabled = false;
  }
};

// ════════════════════════════
//  Detail View + Clips (inline, no modal)
// ════════════════════════════
function showGrid() {
  const v = $('#detailVideo');
  v.pause();
  v.controls = true;
  stopPreview();
  S.playingClipId = null;
  $('#grid').style.display = '';
  $('#detailView').style.display = 'none';
  S.curTrick = null;
}

$('#backToGrid').onclick = showGrid;

async function openDetail(id) {
  const t = S.tricks.find(x => x.id === id);
  if (!t) return;
  S.curTrick = t;
  S.navIdx = S.tricks.findIndex(x => x.id === id);

  updateNavButtons();

  $('#grid').style.display = 'none';
  $('#detailView').style.display = '';
  $('#mainArea').scrollTop = 0;
  window.scrollTo(0, 0);

  $('#detailName').textContent = t.name;
  $('#detailTags').innerHTML = `<span class="cat-tag">${catPath(t.category)}</span>`;
  $('#detailNotes').textContent = t.notes || '';

  const v = $('#detailVideo');
  v.style.opacity = '0';
  v.src = t.videoPath;
  v.load();
  v.ontimeupdate = () => {
    if (S.playingClipId && S.curTrick) {
      const clip = S.curTrick.clips?.find(c => c.id === S.playingClipId);
      if (clip && v.currentTime >= clip.endTime) {
        v.currentTime = clip.startTime;
      }
    }
  };
  v.play().catch(() => {});
  v.oncanplay = () => { v.style.opacity = '1'; v.oncanplay = null; };

  $('#clipAddPanel').style.display = 'none';
  resetClipForm();
  renderClips();
}

function updateNavButtons() {
  const total = S.tricks.length;
  $('#prevTrickBtn').disabled = total <= 1;
  $('#nextTrickBtn').disabled = total <= 1;
  $('#navInfo').textContent = total > 1 ? `${S.navIdx + 1} / ${total}` : '';
}

$('#prevTrickBtn').onclick = () => {
  if (S.tricks.length <= 1) return;
  S.navIdx = (S.navIdx - 1 + S.tricks.length) % S.tricks.length;
  openDetail(S.tricks[S.navIdx].id);
};
$('#nextTrickBtn').onclick = () => {
  if (S.tricks.length <= 1) return;
  S.navIdx = (S.navIdx + 1) % S.tricks.length;
  openDetail(S.tricks[S.navIdx].id);
};

// ── Keyboard Actions ──
async function deleteCurrentTrick() {
  if (!S.curTrick || !confirm('确定删除「' + S.curTrick.name + '」？')) return;
  await fetch(`/api/tricks/${S.curTrick.id}`, { method: 'DELETE' });
  showGrid();
  await loadAll();
  toast('已删除');
}

async function toggleStar() {
  if (!S.curTrick) return;
  const name = S.curTrick.name;
  let newName;
  if (name.endsWith('-[stared]')) {
    newName = name.slice(0, -9);
  } else {
    newName = name + '-[stared]';
  }
  try {
    const r = await fetch(`/api/tricks/${S.curTrick.id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newName })
    });
    if (!r.ok) throw new Error((await r.json()).error);
    S.curTrick.name = newName;
    // Update in allTricks and tricks arrays
    const at = S.allTricks.find(t => t.id === S.curTrick.id);
    if (at) at.name = newName;
    const tr = S.tricks.find(t => t.id === S.curTrick.id);
    if (tr) tr.name = newName;
    $('#detailName').textContent = newName;
    toast(newName.includes('[stared]') ? '已收藏' : '已取消收藏');
  } catch (e) { toast('操作失败: ' + e.message); }
}

$('#detailVideo').addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); e.stopPropagation(); const v = e.target; v.paused ? v.play() : v.pause(); }
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  // Detail view navigation
  if ($('#detailView').style.display !== 'none') {
    if (e.key === 'ArrowUp') { e.preventDefault(); $('#prevTrickBtn').click(); }
    if (e.key === 'ArrowDown') { e.preventDefault(); $('#nextTrickBtn').click(); }
    if (e.key === 'Escape') { $('#backToGrid').click(); }
    if (e.key === ' ' && e.target.tagName !== 'VIDEO') { e.preventDefault(); const v = $('#detailVideo'); v.paused ? v.play() : v.pause(); }
    if (e.key === 'f' || e.key === 'F') {
      e.preventDefault();
      if (document.fullscreenElement) document.exitFullscreen();
      else $('#detailVideo').requestFullscreen();
    }
    if (e.key === 'Delete') { e.preventDefault(); deleteCurrentTrick(); }
    if (e.key === 'z' || e.key === 'Z') { e.preventDefault(); toggleStar(); }
  }
  // Clip marking shortcuts (only when clip panel is open)
  if ($('#clipAddPanel').style.display !== 'none') {
    if (e.key === 'a' || e.key === 'A') $('#markStartBtn').click();
    if (e.key === 'b' || e.key === 'B') $('#markEndBtn').click();
  }
});

function renderClips() {
  const list = $('#clipList');
  const clips = S.curTrick?.clips || [];
  $('#stopClipBtn').style.display = S.playingClipId ? '' : 'none';
  if (!clips.length) {
    list.innerHTML = '<div style="font-size:13px;color:var(--text3);padding:8px 0">暂无片段，点击下方按钮标记</div>';
    return;
  }
  list.innerHTML = '';
  for (const clip of clips) {
    const item = document.createElement('div');
    item.className = 'clip-item' + (S.playingClipId === clip.id ? ' playing' : '');

    item.innerHTML = `<span class="clip-name">${clip.name}</span>`;

    // Click pill to play
    item.onclick = e => { if (!e.target.closest('.inline-edit')) playClip(clip); };

    // Right-click context menu
    item.oncontextmenu = e => {
      e.preventDefault();
      showClipCtxMenu(e.clientX, e.clientY, clip);
    };

    list.appendChild(item);
  }
}

// ── Clip Context Menu ──
let ctxClip = null;

function showClipCtxMenu(x, y, clip) {
  ctxClip = clip;
  const m = $('#ctxMenu');
  m.classList.add('show');
  // Clamp to viewport
  const mw = 130, mh = 80;
  m.style.left = Math.min(x, window.innerWidth - mw) + 'px';
  m.style.top = Math.min(y, window.innerHeight - mh) + 'px';
}

document.addEventListener('click', () => { $('#ctxMenu').classList.remove('show'); });

$('#ctxEdit').onclick = () => {
  if (!ctxClip) return;
  openEditClip(ctxClip);
};

$('#ctxRename').onclick = () => {
  if (!ctxClip) return;
  const clip = ctxClip;
  const name = prompt('片段名称', clip.name);
  if (name && name.trim() && name.trim() !== clip.name) {
    fetch(`/api/tricks/${S.curTrick.id}/clips/${clip.id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim() })
    }).then(() => {
      clip.name = name.trim();
      return loadAll();
    }).then(() => {
      const updated = S.tricks.find(x => x.id === S.curTrick.id);
      if (updated) { S.curTrick = updated; renderClips(); }
    });
  }
};

function exportClip(format) {
  if (!ctxClip || !S.curTrick) return;
  const url = `/api/tricks/${S.curTrick.id}/clips/${ctxClip.id}/export?format=${format}`;
  toast(`正在导出 ${format.toUpperCase()}...`);
  const a = document.createElement('a');
  a.href = url;
  a.download = '';
  document.body.appendChild(a);
  a.click();
  a.remove();
}

$('#ctxExportMp4').onclick = () => exportClip('mp4');
$('#ctxExportGif').onclick = () => exportClip('gif');

$('#ctxDelete').onclick = async () => {
  if (!ctxClip) return;
  const clip = ctxClip;
  await fetch(`/api/tricks/${S.curTrick.id}/clips/${clip.id}`, { method: 'DELETE' });
  if (S.playingClipId === clip.id) S.playingClipId = null;
  await loadAll();
  const updated = S.tricks.find(x => x.id === S.curTrick.id);
  if (updated) { S.curTrick = updated; renderClips(); }
};

let ctxCard = null;

function showCardCtxMenu(x, y, card) {
  ctxCard = card;
  const m = $('#cardCtxMenu');
  m.classList.add('show');
  const mw = 130, mh = 80;
  m.style.left = Math.min(x, window.innerWidth - mw) + 'px';
  m.style.top = Math.min(y, window.innerHeight - mh) + 'px';

document.addEventListener('click', () => { $('#cardCtxMenu').classList.remove('show'); });

$('#cardCtxRename').onclick = () => {
  if (!ctxCard) return;
  const card = ctxCard;
  const name = prompt('名称', card.name);
  if (name && name.trim() && name.trim() !== card.name) {
    fetch(`/api/tricks/${card.id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim() })
    }).then(() => loadAll());

$('#cardCtxDelete').onclick = async () => {
  if (!ctxCard) return;
  if (!confirm('确定删除「' + ctxCard.name + '」？')) return;
  await fetch(`/api/tricks/${ctxCard.id}`, { method: 'DELETE' });
  await loadAll();
  toast('已删除');
};

function stopClip() {
  S.playingClipId = null;
  $('#detailVideo').controls = true;
  renderClips();
}

$('#stopClipBtn').onclick = stopClip;

function playClip(clip) {
  stopPreview();
  const v = $('#detailVideo');
  S.playingClipId = clip.id;
  v.controls = false;
  v.currentTime = clip.startTime;
  v.play();
  renderClips();
}

// ── Clip Add Panel ──
let editingClipId = null;

$('#toggleClipAdd').onclick = () => {
  const p = $('#clipAddPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  if (p.style.display === 'block') resetClipForm();
};

let markS = null, markE = null;

function resetClipForm() {
  markS = markE = null;
  editingClipId = null;
  $('#markStartVal').textContent = '--';
  $('#markEndVal').textContent = '--';
  $('#clipNameInput').value = '';
  $('#clipEditTitle').style.display = 'none';
  $('#cancelEditBtn').style.display = 'none';
  $('#saveClipBtn').textContent = '保存片段';
  stopPreview();
}

function openEditClip(clip) {
  const p = $('#clipAddPanel');
  p.style.display = 'block';
  editingClipId = clip.id;
  markS = clip.startTime;
  markE = clip.endTime;
  $('#markStartVal').textContent = markS.toFixed(2) + 's';
  $('#markEndVal').textContent = markE.toFixed(2) + 's';
  $('#clipNameInput').value = clip.name;
  $('#clipEditTitle').style.display = '';
  $('#cancelEditBtn').style.display = '';
  $('#saveClipBtn').textContent = '更新片段';
}

$('#cancelEditBtn').onclick = () => {
  resetClipForm();
};

$('#markStartBtn').onclick = () => {
  markS = parseFloat($('#detailVideo').currentTime.toFixed(2));
  $('#markStartVal').textContent = markS.toFixed(2) + 's';
};

$('#markEndBtn').onclick = () => {
  markE = parseFloat($('#detailVideo').currentTime.toFixed(2));
  $('#markEndVal').textContent = markE.toFixed(2) + 's';
};

// ── Preview ──
let previewActive = false;

$('#previewClipBtn').onclick = () => {
  if (markS === null || markE === null) return toast('请先标记起点和终点');
  if (markE <= markS) return toast('终点必须大于起点');
  const v = $('#detailVideo');
  if (previewActive) { stopPreview(); return; }
  previewActive = true;
  S.playingClipId = null;
  v.controls = false;
  $('#previewClipBtn').textContent = '停止';
  v.currentTime = markS;
  v.play();
  v.ontimeupdate = () => {
    if (previewActive && v.currentTime >= markE) {
      v.currentTime = markS;
    }
  };
  renderClips();
};

function stopPreview() {
  if (!previewActive) return;
  previewActive = false;
  $('#previewClipBtn').textContent = '预览';
  const v = $('#detailVideo');
  v.controls = true;
  v.ontimeupdate = () => {
    if (S.playingClipId && S.curTrick) {
      const clip = S.curTrick.clips?.find(c => c.id === S.playingClipId);
      if (clip && v.currentTime >= clip.endTime) {
        v.currentTime = clip.startTime;
      }
    }
  };
}

$('#saveClipBtn').onclick = async () => {
  if (markS === null || markE === null) return toast('请先标记起点和终点');
  if (markE <= markS) return toast('终点必须大于起点');
  if (markE - markS < 0.3) return toast('片段至少 0.3 秒');

  const btn = $('#saveClipBtn');
  const isEdit = !!editingClipId;
  btn.textContent = isEdit ? '更新中...' : '保存中...';
  btn.disabled = true;
  try {
    const r = await fetch(
      isEdit ? `/api/tricks/${S.curTrick.id}/clips/${editingClipId}` : `/api/tricks/${S.curTrick.id}/clips`,
      {
        method: isEdit ? 'PATCH' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ startTime: markS, endTime: markE, name: $('#clipNameInput').value.trim() })
      }
    );
    if (!r.ok) throw new Error((await r.json()).error);
    await loadAll();
    const updated = S.tricks.find(x => x.id === S.curTrick.id) || S.allTricks.find(x => x.id === S.curTrick.id);
    if (updated) { S.curTrick = updated; renderClips(); }
    resetClipForm();
    $('#clipAddPanel').style.display = 'none';
    toast(isEdit ? '片段已更新' : '片段已保存');
  } catch (err) {
    toast((isEdit ? '更新失败: ' : '保存失败: ') + err.message);
  } finally {
    btn.textContent = isEdit ? '更新片段' : '保存片段';
    btn.disabled = false;
  }
};

// ── Delete Trick ──
$('#deleteTrick').onclick = async () => {
  if (!S.curTrick || !confirm('确定删除「' + S.curTrick.name + '」？')) return;
  await fetch(`/api/tricks/${S.curTrick.id}`, { method: 'DELETE' });
  showGrid();
  await loadAll();
  toast('已删除');
};

// ── Toast ──
function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Mobile Sidebar Toggle ──
function closeSidebar() {
  $('#sidebar').classList.remove('open');
  $('#sidebarOverlay').style.display = 'none';
}
$('#hamburgerBtn').onclick = () => {
  const sb = $('#sidebar');
  const opening = !sb.classList.contains('open');
  sb.classList.toggle('open');
  $('#sidebarOverlay').style.display = opening ? 'block' : 'none';
};
$('#sidebarOverlay').onclick = closeSidebar;

// ── Init ──
loadAll();
</script>
</body>
</html>
